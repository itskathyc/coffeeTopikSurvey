<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/assets/coffeebean.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoffeeTopik Survey</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Netlify Identity (for admin) -->
  <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Hidden form for Netlify Forms to detect -->
  <form name="survey-results" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="survey-results" />
    <input type="text" name="type" />
    <input type="text" name="language" />
    <input type="text" name="q1" /><input type="text" name="q2" /><input type="text" name="q3" />
    <input type="text" name="q4" /><input type="text" name="q5" /><input type="text" name="q6" />
    <input type="text" name="q7" /><input type="text" name="q8" /><input type="text" name="q9" />
    <input type="text" name="q10" />
    <input type="text" name="phoneNumber" />
  </form>
</body>

</html>
